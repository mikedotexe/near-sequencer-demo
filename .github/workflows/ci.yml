name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Three gates: the Rust wasm build + unit tests, the TypeScript type
# check, and a regression check on the committed report.md's top-line
# invariant badges. If any of the four invariants (DAG-placement,
# Budget, Atomicity, Shard-placement) ever regresses on re-audit
# against the committed artifacts, this job fails before a reader
# sees stale PASS claims in the report.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust (stable + wasm32-unknown-unknown)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      - name: cargo build --release --target wasm32-unknown-unknown
        run: cargo build --release --target wasm32-unknown-unknown

      - name: cargo test --workspace (host target)
        run: cargo test --workspace

      - name: npm ci (scripts/)
        working-directory: scripts
        run: npm ci

      - name: tsc --noEmit (scripts/)
        run: ./scripts/node_modules/.bin/tsc --noEmit -p scripts/tsconfig.json

      - name: npm test (scripts/) — invariant aggregation unit tests
        working-directory: scripts
        run: npm test

      - name: Verify invariants in committed report.md (both networks)
        run: |
          set -euo pipefail
          for network in testnet mainnet; do
            report="artifacts/${network}/report.md"
            test -f "$report" || { echo "missing $report"; exit 1; }
            grep -Fq -- '- DAG-placement: **PASS**' "$report" \
                || { echo "DAG-placement invariant line not PASS in $report"; exit 1; }
            grep -Fq -- '- Budget (NEP-519 200-block timeout): **PASS**' "$report" \
                || { echo "Budget invariant line not PASS in $report"; exit 1; }
            grep -Fq -- '- Atomicity (Recipe 4): **PASS**' "$report" \
                || { echo "Atomicity invariant line not PASS in $report"; exit 1; }
            grep -Fq -- '- Shard-placement: **PASS**' "$report" \
                || { echo "Shard-placement invariant line not PASS in $report"; exit 1; }
            echo "all four invariant badges PASS in $report"
          done

      - name: Verify comparative report exists + shows dual-network PASS
        run: |
          set -euo pipefail
          report=artifacts/comparative.md
          test -f "$report" || { echo "missing $report"; exit 1; }
          grep -Fq -- 'All four invariants hold identically on both testnet and mainnet.' "$report" \
              || { echo "comparative.md missing dual-network PASS headline"; exit 1; }
          echo "comparative.md shows dual-network PASS"
